<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - PadelReserve</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR BOOTSTRAP -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand fw-bold fs-5" href="index.html">PadelReserve</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-1">
                <li class="nav-item">
                    <a class="nav-link text-secondary" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-secondary" href="booking.html">Booking</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active fw-semibold text-dark" href="login.html">Login Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- LOGIN SECTION -->
<section class="d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="container">
        <div class="row justify-content-center align-items-center g-4">

            <!-- LEFT PANEL: Image/Brand Placeholder -->
            <div class="col-12 col-md-5 d-none d-md-block">
                <div class="login-img-placeholder d-flex align-items-center justify-content-center">
                    <div class="text-center text-muted">
                        <div class="fs-1 mb-2">🏓</div>
                        <p class="small">PadelReserve Admin</p>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: LOGIN FORM CARD -->
            <div class="col-12 col-md-5">
                <div class="card border-0 rounded-0 shadow-sm p-4 p-lg-5">
                    <p class="text-uppercase text-muted small letter-wide mb-1">Secure Access</p>
                    <h2 class="fw-bold mb-2">Admin Portal</h2>
                    <p class="text-muted small mb-4">
                        Authorized personnel only. Please enter your management credentials to access the dashboard.
                    </p>

                    <!-- FORM BOOTSTRAP -->
                    <div id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-uppercase">Username</label>
                            <input type="text" class="form-control rounded-0 py-3 bg-light border-0" id="user" placeholder="Enter admin ID">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-semibold text-uppercase">Password</label>
                            <input type="password" class="form-control rounded-0 py-3 bg-light border-0" id="pass" placeholder="••••••••">
                        </div>

                        <!-- BUTTON BOOTSTRAP -->
                        <button type="button" class="btn btn-dark w-100 rounded-0 py-3 fw-semibold" onclick="doLogin()">
                            Login Admin
                        </button>
                    </div>

                    <!-- SYSTEM STATUS -->
                    <div class="mt-4">
                        <small class="text-uppercase text-muted d-block mb-2">System Check</small>
                        <div class="d-flex justify-content-between bg-light p-3 border">
                            <small>Status: <strong>Encrypted</strong></small>
                            <small>Region: <strong>Global-HQ</strong></small>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function doLogin() {
        const user = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;

        if (user === "admin" && pass === "123") {
            window.location.href = "dashboard.html";
        } else {
            alert("Username / Password salah!");
        }
    }

    // Allow Enter key
    document.getElementById("pass").addEventListener("keydown", function(e) {
        if (e.key === "Enter") doLogin();
    });
</script>
</body>
</html>
