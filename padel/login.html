<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin – PadelReserve</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg pr-navbar shadow-none">
  <div class="container-fluid px-4 px-lg-5">
    <a class="navbar-brand" href="index.html">PadelReserve</a>
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMain">
      <ul class="navbar-nav gap-1 align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
        <li class="nav-item"><a class="nav-link active" href="login.html">Login Admin</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 56px);">
  <div class="container px-4">
    <div class="row justify-content-center align-items-center g-4">

      <!-- LEFT: Image -->
      <div class="col-12 col-md-5 d-none d-md-block">
        <img src="loginpadel.png" alt="Padel Court" class="img-fluid rounded"
             style="width:100%;height:420px;object-fit:cover;">
        <p class="mt-3" style="font-size:0.75rem;color:#9ca3af;text-align:center;">
          Akses terbatas untuk pengelola lapangan resmi.
        </p>
      </div>

      <!-- RIGHT: Form -->
      <div class="col-12 col-md-5">
        <div class="pr-card p-4 p-lg-5">
          <span class="sec-label d-block mb-1">Secure Access</span>
          <h2 class="fw-bold mb-1" style="color:#1f2937;">Admin Portal</h2>
          <p class="mb-4" style="font-size:0.8rem;color:#9ca3af;">
            Masukkan kredensial Anda untuk mengakses dashboard pengelolaan lapangan.
          </p>

          <div id="loginForm">
            <div id="loginAlert" class="alert mb-3 d-none" role="alert" style="font-size:0.8rem;border-radius:6px;"></div>

            <div class="mb-3">
              <label class="pr-label" for="user">Username</label>
              <input type="text" class="form-control pr-input" id="user" placeholder="Masukkan admin ID" autocomplete="username">
            </div>
            <div class="mb-4">
              <label class="pr-label" for="pass">Password</label>
              <input type="password" class="form-control pr-input" id="pass" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="button" class="btn btn-pr w-100 py-3" onclick="doLogin()">
              <i class="bi bi-box-arrow-in-right me-2"></i>Masuk ke Dashboard
            </button>
          </div>

          <div class="mt-4 p-3 rounded" style="background:#f3f4f6;border:1px solid #e5e7eb;">
            <div class="d-flex justify-content-between">
              <small style="font-size:0.7rem;color:#9ca3af;">Status: <strong style="color:#374151;">Encrypted</strong></small>
              <small style="font-size:0.7rem;color:#9ca3af;">Region: <strong style="color:#374151;">Global-HQ</strong></small>
            </div>
          </div>
        </div>

        <p class="mt-3 text-center" style="font-size:0.72rem;color:#d1d5db;">
          Demo: username <strong>admin</strong> / password <strong>123</strong>
        </p>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function doLogin() {
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value;

    if (!user || !pass) {
      showAlert('Mohon isi username dan password.', 'warning');
      return;
    }
    if (user === 'admin' && pass === '123') {
      showAlert('Login berhasil! Mengalihkan ke dashboard...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } else {
      showAlert('Username atau password salah. Coba lagi.', 'danger');
    }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('loginAlert');
    el.className = `alert alert-${type} mb-3`;
    el.textContent = msg;
  }

  document.getElementById('pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
